{% set name = "numpyro" %}
{% set version = "0.21.0" %}
{% set python_min = "3.11" %}

package:
  name: numpyro
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: fc4a90a024a08840868d46b5f9bdc416dfa3ab76c61691036b44ac2b8a77ac77

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install .

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61
    - wheel
  run:
    - jax >=0.7.0
    - jaxlib >=0.7.0
    - multipledispatch
    - numpy
    - python >={{ python_min }}
    - tqdm

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - numpyro
  commands:
    - pip check

about:
  home: https://github.com/pyro-ppl/numpyro
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE.md
  summary: "Probabilistic programming with NumPy powered by JAX for autograd and JIT compilation to GPU/TPU/CPU."
  doc_url: https://num.pyro.ai/en/stable/

extra:
  recipe-maintainers:
    - fehiepsi
    - freddyaboulton
    - thewchan
